stages:
  - verify
  - lint
  - test
  - package
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_TAG

default:
  interruptible: true
  tags:
    - smart-robo-nav
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .cache/pip

variables:
  GIT_DEPTH: "20"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"

.python_job:
  image: python:3.11-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt -r requirements-web.txt

verify:backend:
  stage: verify
  extends: .python_job
  script:
    - python -m compileall src server.py main.py config.py tests
    - python -c "import json, pathlib; json.loads(pathlib.Path('data/warehouse_layout.json').read_text()); print('warehouse_layout.json ok')"

verify:frontend:
  stage: verify
  image: node:20-alpine
  script:
    - node --version
    - node --check web/app.js
    - node -e "JSON.parse(require('fs').readFileSync('vercel.json', 'utf8')); console.log('vercel.json ok')"

lint:backend:
  stage: lint
  extends: .python_job
  needs:
    - verify:backend
  script:
    - black --check src tests server.py main.py config.py
    - flake8 src tests server.py main.py config.py

test:pytest:
  stage: test
  extends: .python_job
  needs:
    - lint:backend
  script:
    - python -m pytest tests -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml --cov-report=html:htmlcov
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

package:backend:
  stage: package
  image: alpine:3.20
  needs:
    - test:pytest
  script:
    - tar -czf smart-robo-nav-backend.tgz config.py main.py server.py render.yaml requirements.txt requirements-web.txt run_tests.sh src data tests
  artifacts:
    expire_in: 1 week
    paths:
      - smart-robo-nav-backend.tgz

package:frontend:
  stage: package
  image: alpine:3.20
  needs:
    - verify:frontend
  script:
    - tar -czf smart-robo-nav-frontend.tgz web vercel.json
  artifacts:
    expire_in: 1 week
    paths:
      - smart-robo-nav-frontend.tgz

deploy:render:
  stage: deploy
  image: curlimages/curl:8.8.0
  needs:
    - package:backend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $RENDER_DEPLOY_HOOK_URL'
      when: manual
    - when: never
  script:
    - curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

deploy:vercel:
  stage: deploy
  image: curlimages/curl:8.8.0
  needs:
    - package:frontend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $VERCEL_DEPLOY_HOOK_URL'
      when: manual
    - when: never
  script:
    - curl --fail --silent --show-error --request POST "$VERCEL_DEPLOY_HOOK_URL"
