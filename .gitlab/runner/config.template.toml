[[runners]]
  environment = [
    "FF_USE_FASTZIP=true",
    "PIP_CACHE_DIR=/cache/pip"
  ]

  [runners.docker]
    tls_verify = false
    image = "python:3.11-slim"
    privileged = false
    pull_policy = "if-not-present"
    disable_entrypoint_overwrite = false
    oom_kill_disable = false
    disable_cache = false
    shm_size = 0
    volumes = ["/cache"]
